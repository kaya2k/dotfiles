# Fonts
font_family family="RobotoMono Nerd Font Mono" style="Medium"
font_size 12
modify_font cell_width 90%
draw_bold_text_with_bright_colors yes

# Cursor
shell_integration no-cursor
cursor_shape block
cursor_shape_unfocused block
cursor_blink_interval 0

# Window
window_margin_width 8 12
placement_strategy top-left
confirm_os_window_close 0

# Tabs
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
tab_bar_style fade
tab_bar_min_tabs 1
tab_bar_drag_threshold 0
tab_title_template "{index}"
active_tab_font_style none

# macOS
macos_titlebar_color #1e1e1e
macos_show_window_title_in none

# Gruvbox colorscheme
cursor                  #ebdbb2
cursor_text_color       background
url_color               #83a598
visual_bell_color       #8ec07c
bell_border_color       #8ec07c
active_border_color     #d3869b
inactive_border_color   #665c54
foreground              #ebdbb2
background              #282828
selection_foreground    none
selection_background    #665c54
active_tab_foreground   #fbf1c7
active_tab_background   #665c54
inactive_tab_foreground #a89984
inactive_tab_background #3c3836
